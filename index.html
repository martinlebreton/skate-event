<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-skateevent.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="description"
      content="Les prochains événements skate en France"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SkateEvent" />
    <meta
      name="description"
      content="Les prochains événements skate en France"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>SkateEvent - Les événements skate en France</title>

    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        animation: rotate90 1s steps(1) infinite;
      }
      @keyframes rotate90 {
        0% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(90deg);
        }
        50% {
          transform: rotate(180deg);
        }
        75% {
          transform: rotate(270deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        #splash {
          background: #0f172a;
        }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <img src="/logo-skateevent.svg" alt="SkateEvent" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Masque le splash quand React est prêt
      window.hideSplash = function () {
        var splash = document.getElementById("splash");
        if (splash) {
          splash.classList.add("hidden");
          setTimeout(function () {
            splash.remove();
          }, 300);
        }
      };
    </script>
  </body>
</html>
